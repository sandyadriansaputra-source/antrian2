<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://www.youtube.com/iframe_api"></script>
  <style>
    /* CSS TETAP SESUAI DESAIN ANDA */
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;700;800&display=swap');
    :root { --primary: #004d26; --gold: #fbc02d; --white: #ffffff; --bg-light: #f8faf8; }
    body { background: #002211; color: var(--white); font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; width: 100vw; }
    .main-content { display: flex; flex: 1; overflow: hidden; width: 100%; }
    .video-container { flex: 1.8; background: #000; border-right: 4px solid var(--gold); position: relative; }
    #ytplayer { width: 100%; height: 100%; border: none; pointer-events: none; }
    .info-panel { flex: 1.2; background: var(--bg-light); display: flex; flex-direction: column; }
    .header { padding: 15px; text-align: center; background: white; border-bottom: 4px solid var(--gold); }
    .header img { height: 60px; }
    .antrian-container { flex: 1; display: flex; flex-direction: column; padding: 15px; gap: 15px; }
    .loket-card { flex: 1; background: white; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 1px solid #e0e0e0; position: relative; }
    .loket-label { position: absolute; top: 0; left: 0; background: var(--primary); color: var(--gold); padding: 8px 25px; font-weight: 900; border-bottom-right-radius: 20px; }
    .no-antrian { font-size: clamp(60px, 10vh, 120px); font-weight: 900; color: var(--primary); font-family: 'Montserrat', sans-serif; }
    .nama-nasabah { background: #f0f4f0; color: #555; padding: 10px; border-radius: 15px; font-weight: 700; width: 85%; text-align: center; text-transform: uppercase; }
    .footer-status { background: white; padding: 15px; display: flex; justify-content: space-between; border-top: 2px solid #eee; }
    .sisa-box b { font-size: 2.5rem; color: #d32f2f; display: block; line-height: 1; }
    .running-text-container { height: 50px; background: var(--primary); color: white; border-top: 3px solid var(--gold); overflow: hidden; }
    #overlay { position: fixed; inset: 0; background: var(--primary); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
    .btn-start { background: var(--gold); color: var(--primary); padding: 20px 40px; border-radius: 50px; font-weight: 900; border: none; }
  </style>
</head>
<body>

<div id="overlay" onclick="aktifkanLayar()">
  <button class="btn-start">AKTIFKAN MONITOR TV</button>
  <p id="unit-name" style="margin-top:20px; color: white;">MEMUAT DATA...</p>
</div>

<div class="main-content">
  <div class="video-container"><div id="ytplayer"></div></div>
  <div class="info-panel">
    <div class="header"><img src="https://monev.pegadaian.co.id/userdata/profile_site/5662a273c270a215cdc46900d8a882f280e84b32c3f02.png"></div>
    <div class="antrian-container">
      <div class="loket-card" id="card-l1">
        <div class="loket-label">LOKET 1</div>
        <div id="l1-no" class="no-antrian">-</div>
        <div id="l1-nama" class="nama-nasabah">Petugas Siap</div>
      </div>
      <div class="loket-card" id="card-l2">
        <div class="loket-label">LOKET 2</div>
        <div id="l2-no" class="no-antrian">-</div>
        <div id="l2-nama" class="nama-nasabah">Petugas Siap</div>
      </div>
    </div>
    <div class="footer-status">
      <div class="sisa-box"><span>SISA ANTREAN</span><b id="sisa">0</b></div>
      <div id="outlet-label" style="color:var(--primary); font-weight:bold;">UNIT KERJA</div>
    </div>
  </div>
</div>

<div class="running-text-container">
  <marquee id="run-text" style="font-size: 1.5rem; padding-top:10px;">Selamat Datang</marquee>
</div>

<script>
// GANTI DENGAN URL WEB APP ANDA
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8Q9vQf1iyoNWshSk1GI8l-Y8vilujajGoJKey-eGgTbLYPtuLNExuJiDGhU_Ts2GE/exec";
let lastTime = "", audioOn = false, ytPlayer, currentPlaylist = [];
let volSheet = 50;

async function aktifkanLayar() {
  document.getElementById('overlay').style.display = 'none';
  audioOn = true;
  
  try {
    const resp = await fetch(`${SCRIPT_URL}?action=getInitData`);
    const init = await resp.json();
    document.getElementById('outlet-label').innerText = init.namaOutlet;
    currentPlaylist = init.playlist;
    
    // Mulai Player YouTube
    onYouTubeIframeAPIReady();
    
    // Jalankan Loop Update Data
    setInterval(checkUpdate, 3000);
  } catch (e) {
    console.error("Gagal Load Init Data");
  }
}

// Fungsi Standar API YouTube
function onYouTubeIframeAPIReady() {
  if (!currentPlaylist || currentPlaylist.length === 0) return;

  ytPlayer = new YT.Player('ytplayer', {
    height: '100%',
    width: '100%',
    videoId: currentPlaylist[0],
    playerVars: {
      'autoplay': 1,
      'controls': 0,
      'mute': 0,
      'loop': 1,
      'playlist': currentPlaylist.join(','),
      'rel': 0,
      'modestbranding': 1,
      'origin': window.location.origin // PENTING untuk GitHub Pages
    },
    events: {
      'onReady': onPlayerReady,
      'onError': onPlayerError
    }
  });
}

function onPlayerReady(event) {
  event.target.setVolume(volSheet);
  event.target.playVideo();
}

function onPlayerError(event) {
  console.log("Video error, skip ke selanjutnya...");
  event.target.nextVideo();
}

async function checkUpdate() {
  if (!audioOn) return;
  try {
    const response = await fetch(`${SCRIPT_URL}?action=getMonitorData`);
    const res = await response.json();
    
    // Update UI
    document.getElementById('l1-no').innerText = res.l1.nomor;
    document.getElementById('l1-nama').innerText = res.l1.nama;
    document.getElementById('l2-no').innerText = res.l2.nomor;
    document.getElementById('l2-nama').innerText = res.l2.nama;
    document.getElementById('sisa').innerText = res.sisa;
    document.getElementById('run-text').innerText = res.runningText;
    
    // Update Volume dari Sel E2
    volSheet = res.settings.volume;
    if(ytPlayer && ytPlayer.setVolume) {
       // Jika sedang panggil suara, volume tetap pelan (ducking logic)
       if (window.speechSynthesis.speaking) {
         ytPlayer.setVolume(Math.max(volSheet - 40, 5));
       } else {
         ytPlayer.setVolume(volSheet);
       }
    }

    // Panggil Suara jika ada waktu baru
    if(res.lastCall && res.lastCall.waktu !== lastTime) {
      lastTime = res.lastCall.waktu;
      panggilSuara(res.lastCall.nomor, res.lastCall.nama, res.lastCall.loket);
    }
  } catch (e) { console.log("Sync Error"); }
}

function panggilSuara(no, nama, loket) {
  window.speechSynthesis.cancel();
  let noSpaced = no.toString().split('').join(' ');
  let teks = `Nomor antrean, ${noSpaced}, . Atas nama, ${nama.toLowerCase()}, . Silahkan ke loket ${loket}`;
  
  let msg = new SpeechSynthesisUtterance(teks);
  msg.lang = 'id-ID'; 
  msg.volume = 1.0; 
  msg.rate = 0.8; 
  window.speechSynthesis.speak(msg);
}
</script>
</body>
</html>
