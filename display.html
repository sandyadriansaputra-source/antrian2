<!DOCTYPE html>
<html>
<head>
<base target="_top">
<script src="https://www.youtube.com/iframe_api"></script>
<style>
/* CSS TETAP SESUAI DESAIN ASLI ANDA */
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;700;800&display=swap');
:root { --primary: #004d26; --gold: #fbc02d; --white: #ffffff; --bg-light: #f8faf8; }
body { background: #002211; color: var(--white); font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; width: 100vw; }
.main-content { display: flex; flex: 1; overflow: hidden; width: 100%; }
.video-container { flex: 1.8; background: #000; border-right: 4px solid var(--gold); position: relative; overflow: hidden; }
#ytplayer { width: 100%; height: 100%; border: none; pointer-events: none; }
.info-panel { flex: 1.2; background: var(--bg-light); display: flex; flex-direction: column; height: 100%; }
.header { padding: 15px; text-align: center; background: white; border-bottom: 4px solid var(--gold); flex-shrink: 0; }
.header img { height: 60px; width: auto; }
.antrian-container { flex: 1; display: flex; flex-direction: column; padding: 15px; gap: 15px; min-height: 0; }
.loket-card { flex: 1; background: white; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 1px solid #e0e0e0; position: relative; overflow: hidden; transition: all 0.5s ease; }
.loket-label { position: absolute; top: 0; left: 0; background: var(--primary); color: var(--gold); padding: 8px 25px; font-weight: 900; font-size: 1.2rem; border-bottom-right-radius: 20px; font-family: 'Montserrat', sans-serif; }
.no-antrian { font-size: clamp(60px, 10vh, 140px); font-weight: 900; color: var(--primary); font-family: 'Montserrat', sans-serif; line-height: 1; }
.nama-nasabah { background: #f0f4f0; color: #555; padding: 10px 20px; border-radius: 15px; font-weight: 700; font-size: 1.1rem; width: 85%; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; }
.footer-status { background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-top: 2px solid #eee; flex-shrink: 0; }
.sisa-box { text-align: left; }
.sisa-box span { font-size: 0.8rem; color: #888; font-weight: 700; }
.sisa-box b { font-size: 2.5rem; color: #d32f2f; display: block; line-height: 1; }
.running-text-container { height: 55px; background: var(--primary); display: flex; align-items: center; border-top: 3px solid var(--gold); overflow: hidden; flex-shrink: 0; }
.running-text { white-space: nowrap; position: relative; font-size: 1.3rem; font-weight: 600; color: white; width: 100%; }
#overlay { position: fixed; inset: 0; background: var(--primary); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
.btn-start { background: var(--gold); color: var(--primary); padding: 25px 50px; border-radius: 50px; font-weight: 900; font-size: 20px; border: none; box-shadow: 0 8px 0 #b88a00; }
</style>
</head>
<body>

<div id="overlay" onclick="aktifkanLayar()">
  <button class="btn-start">AKTIFKAN MONITOR TV</button>
  <p id="unit-name" style="margin-top:20px; letter-spacing: 2px; color: white;">MENUNGGU API YOUTUBE...</p>
</div>

<div class="main-content">
  <div class="video-container" id="player-anchor">
    <div id="ytplayer"></div>
  </div>
  
  <div class="info-panel">
    <div class="header"><img src="https://monev.pegadaian.co.id/userdata/profile_site/5662a273c270a215cdc46900d8a882f280e84b32c3f02.png"></div>
    <div class="antrian-container">
      <div class="loket-card" id="card-l1">
        <div class="loket-label">LOKET 1</div>
        <div id="l1-no" class="no-antrian">-</div>
        <div id="l1-nama" class="nama-nasabah">Petugas Siap</div>
      </div>
      <div class="loket-card" id="card-l2">
        <div class="loket-label">LOKET 2</div>
        <div id="l2-no" class="no-antrian">-</div>
        <div id="l2-nama" class="nama-nasabah">Petugas Siap</div>
      </div>
    </div>
    <div class="footer-status">
      <div class="sisa-box"><span>SISA ANTREAN</span><b id="sisa">0</b></div>
      <div style="font-size: 10px; color: #555; text-align: right; line-height: 1.2;">UNIT KERJA:<br><b id="outlet-label" style="color:var(--primary); font-size: 12px;">UNIT KERJA</b></div>
    </div>
  </div>
</div>

<div class="running-text-container">
  <marquee id="run-text" class="running-text" scrollamount="5">Selamat Datang di Pegadaian</marquee>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzSIFn_5puCP5QxD2SvGUgBYyw537PFKuZ9CXE6Xu60kkeN56rVjMnekZuV_-nWxkuJ/exec";
// VIDEO PANCINGAN: Agar player tercipta seketika saat tombol diklik
const VIDEO_AWAL = "pWIs7-L_uS0"; 

let lastTime = "", audioOn = false, ytPlayer, volumeSheet = 50, currentVideoId = VIDEO_AWAL;

// Fungsi untuk memastikan YouTube API sudah siap sebelum tombol diproses
function pastikanYTReady() {
  return new Promise((resolve) => {
    if (typeof YT !== 'undefined' && YT.Player) return resolve();
    const interval = setInterval(() => {
      if (typeof YT !== 'undefined' && YT.Player) {
        clearInterval(interval);
        resolve();
      }
    }, 100);
  });
}

async function aktifkanLayar() {
  await pastikanYTReady(); // Tunggu API siap
  
  document.getElementById('overlay').style.display = 'none';
  audioOn = true;
  
  // 1. Buat Player dengan video pancingan (Instan)
  initYoutube([VIDEO_AWAL]);

  // 2. Ambil data asli dari Spreadsheet
  setTimeout(muatDataAwal, 1500);
  
  // 3. Jalankan loop update
  setInterval(checkUpdate, 3000);
}

async function muatDataAwal() {
  try {
    const resp = await fetch(`${SCRIPT_URL}?action=getInitData`);
    const init = await resp.json();
    document.getElementById('outlet-label').innerText = init.namaOutlet;
    document.getElementById('unit-name').innerText = init.namaOutlet;
    
    if (init.playlist && init.playlist.length > 0) {
      currentVideoId = init.playlist[0];
      // Jika player sudah ada, ganti isinya ke playlist B2
      if (ytPlayer && typeof ytPlayer.loadPlaylist === 'function') {
        ytPlayer.loadPlaylist(init.playlist);
      }
    }
  } catch (e) { console.error("Gagal muat data awal:", e); }
}

function initYoutube(playlist) {
  const container = document.getElementById('player-anchor'); 
  container.innerHTML = `<div id="ytplayer"></div>`;
  
  ytPlayer = new YT.Player('ytplayer', {
    height: '100%', width: '100%',
    videoId: playlist[0],
    playerVars: {
      'autoplay': 1, 'mute': 1, 'controls': 0, 'disablekb': 1,
      'playlist': playlist.join(','), 'loop': 1, 'rel': 0, 'enablejsapi': 1,
      'origin': window.location.origin
    },
    events: {
      'onReady': (event) => {
        event.target.playVideo();
        setTimeout(() => {
          event.target.unMute();
          event.target.setVolume(volumeSheet);
          event.target.playVideo(); // Paksa putar lagi setelah unmute
        }, 1500);
      },
      'onStateChange': (event) => {
        // Jika tidak sengaja terhenti, paksa putar kembali
        if (event.data === YT.PlayerState.PAUSED) {
          event.target.playVideo();
        }
      },
      'onError': () => {
        // Fallback jika API gagal
        container.innerHTML = `<iframe id="ytplayer" 
          src="https://www.youtube.com/embed/${playlist[0]}?autoplay=1&mute=0&playlist=${playlist.join(',')}&loop=1" 
          style="width:100%; height:100%; border:none;" allow="autoplay"></iframe>`;
      }
    }
  });
}

async function checkUpdate() {
  if (!audioOn) return;
  try {
    const response = await fetch(`${SCRIPT_URL}?action=getMonitorData`);
    const res = await response.json();
    
    if (res.playlist && res.playlist.length > 0) {
      const newVideoId = res.playlist[0];
      if (newVideoId !== currentVideoId) {
        currentVideoId = newVideoId;
        if (ytPlayer && typeof ytPlayer.loadPlaylist === 'function') {
           ytPlayer.loadPlaylist(res.playlist);
        } else {
           initYoutube(res.playlist);
        }
      }
    }

    // Update Tampilan Data
    document.getElementById('l1-no').innerText = (res.l1 && res.l1.nomor) ? res.l1.nomor : "-";
    document.getElementById('l1-nama').innerText = (res.l1 && res.l1.nama) ? res.l1.nama : "Petugas Siap";
    document.getElementById('l2-no').innerText = (res.l2 && res.l2.nomor) ? res.l2.nomor : "-";
    document.getElementById('l2-nama').innerText = (res.l2 && res.l2.nama) ? res.l2.nama : "Petugas Siap";
    document.getElementById('sisa').innerText = res.sisa || "0";
    document.getElementById('run-text').innerText = res.runningText || "Selamat Datang";
    
    if (res.settings && res.settings.kecepatan) document.getElementById('run-text').scrollAmount = res.settings.kecepatan;
    if(res.settings && res.settings.volume !== undefined) {
      volumeSheet = res.settings.volume;
      if(ytPlayer && typeof ytPlayer.setVolume === 'function') ytPlayer.setVolume(volumeSheet);
    }

    if(res.lastCall && res.lastCall.waktu !== lastTime) {
      lastTime = res.lastCall.waktu;
      if(ytPlayer && typeof ytPlayer.setVolume === 'function') ytPlayer.setVolume(Math.max(volumeSheet - 40, 5));
      panggilSuara(res.lastCall.nomor, res.lastCall.nama, res.lastCall.loket);
      
      const card = document.getElementById("card-l" + res.lastCall.loket);
      if(card) {
        card.style.backgroundColor = "#fff9e6";
        setTimeout(() => {
          card.style.backgroundColor = "white";
          if(ytPlayer && typeof ytPlayer.setVolume === 'function') ytPlayer.setVolume(volumeSheet);
        }, 8000);
      }
    }
  } catch (e) { console.error("Update Error:", e); }
}

function panggilSuara(no, nama, loket) {
  window.speechSynthesis.cancel();
  let noSpaced = no.toString().split('').join(' ');
  let teks = `Nomor antrean, ${noSpaced}, . . Atas nama, ${nama.toLowerCase()}, . . Silahkan ke loket ${loket}`;
  let msg = new SpeechSynthesisUtterance(teks);
  msg.lang = 'id-ID'; msg.volume = 1.0; msg.rate = 0.8; msg.pitch = 1.1; 
  window.speechSynthesis.speak(msg);
}
</script>
</body>
</html>
